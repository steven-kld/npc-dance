services:
  npc:
    build: .
    ports:
      - "6080:6080"   # noVNC → open http://localhost:6080 to watch the browser
      - "8000:8000"   # agent WebSocket → ws://localhost:8000/ws
    shm_size: '256mb'   # Chrome needs >64MB /dev/shm (Docker default) to avoid "Aw, Snap!"
    cap_add:
      - SYS_ADMIN     # required for Chrome's sandbox (replaces --no-sandbox)
    devices:
      - /dev/dri:/dev/dri  # GPU passthrough for Intel / AMD
    environment:
      - NO_VNCVIEWER=1
      - AWS_BEARER_TOKEN_BEDROCK=${AWS_BEARER_TOKEN_BEDROCK}
    volumes:
      - ./flows:/home/npc/app/flows   # persist flow memory on host
      - ./result.jpg:/home/npc/app/result.jpg
      - ./agent.log:/home/npc/app/agent.log

